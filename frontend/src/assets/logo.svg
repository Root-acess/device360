<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Phone icon with 360 arc -->
  <g>
    <!-- Phone body -->
    <rect x="6" y="8" width="34" height="58" rx="6" fill="#1D4ED8"/>
    <rect x="10" y="14" width="26" height="42" rx="3" fill="#EFF6FF"/>
    <!-- Home button dot -->
    <circle cx="23" cy="61" r="2.5" fill="#93C5FD"/>
    <!-- Screen content lines -->
    <rect x="13" y="18" width="20" height="2.5" rx="1.25" fill="#BFDBFE"/>
    <rect x="13" y="23" width="16" height="2" rx="1" fill="#DBEAFE"/>
    <rect x="13" y="27" width="18" height="2" rx="1" fill="#DBEAFE"/>
    <!-- 360-degree arc around phone -->
    <path d="M 2 37 A 22 22 0 0 1 44 37" stroke="#6366F1" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 44 43 A 22 22 0 0 1 2 43" stroke="#6366F1" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="4 3"/>
    <!-- Arrow tip on arc -->
    <polygon points="2,35 6,39 0,40" fill="#6366F1"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="52" font-family="'Arial Black', 'Arial Bold', sans-serif" font-weight="900" font-size="34" fill="#111827" letter-spacing="-1">Device</text>
  <text x="194" y="52" font-family="'Arial Black', 'Arial Bold', sans-serif" font-weight="900" font-size="34" fill="#4F46E5" letter-spacing="-1">360</text>
  <!-- Sparkle / plus mark -->
  <g transform="translate(295, 12)">
    <line x1="7" y1="0" x2="7" y2="14" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="14" y2="7" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="2" x2="12" y2="12" stroke="#111827" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="12" y1="2" x2="2" y2="12" stroke="#111827" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Tagline -->
  <text x="58" y="67" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" letter-spacing="2" font-weight="500">LIVE REPAIR LAB</text>
</svg>
